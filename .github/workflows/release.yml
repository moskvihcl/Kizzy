name: Build Release Apk

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Release Apk
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.5.0
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v3

      - name: Setup jdk-17
        uses: actions/setup-java@main
        with:
          java-version: 17
          distribution: 'adopt'
          cache: gradle

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -alias kizzyfork \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass kizzyfork -keypass kizzyfork \
            -dname "CN=Kizzy Fork, OU=Fork, O=Kizzy, L=NA, S=NA, C=NA"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set fork version
        run: |
          sed -i 's/version-name = ".*"/version-name = "6.2-fork-${{ github.run_number }}"/' gradle/libs.versions.toml
          sed -i 's/version-code =".*"/version-code ="${{ github.run_number }}"/' gradle/libs.versions.toml

      - name: Update app icon
        run: |
          sudo apt-get install -y imagemagick
          SRC="kizzy-fork-icon.png"
          convert "$SRC" -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert "$SRC" -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert "$SRC" -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert "$SRC" -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert "$SRC" -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert "$SRC" -resize 108x108 app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          convert "$SRC" -resize 162x162 app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          convert "$SRC" -resize 216x216 app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          convert "$SRC" -resize 324x324 app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          convert "$SRC" -resize 432x432 app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
          convert -size 108x108 xc:"#BF1527" app/src/main/res/mipmap-mdpi/ic_launcher_background.png
          convert -size 162x162 xc:"#BF1527" app/src/main/res/mipmap-hdpi/ic_launcher_background.png
          convert -size 216x216 xc:"#BF1527" app/src/main/res/mipmap-xhdpi/ic_launcher_background.png
          convert -size 324x324 xc:"#BF1527" app/src/main/res/mipmap-xxhdpi/ic_launcher_background.png
          convert -size 432x432 xc:"#BF1527" app/src/main/res/mipmap-xxxhdpi/ic_launcher_background.png
          convert "$SRC" -resize 108x108 -colorspace gray app/src/main/res/mipmap-mdpi/ic_launcher_monochrome.png
          convert "$SRC" -resize 162x162 -colorspace gray app/src/main/res/mipmap-hdpi/ic_launcher_monochrome.png
          convert "$SRC" -resize 216x216 -colorspace gray app/src/main/res/mipmap-xhdpi/ic_launcher_monochrome.png
          convert "$SRC" -resize 324x324 -colorspace gray app/src/main/res/mipmap-xxhdpi/ic_launcher_monochrome.png
          convert "$SRC" -resize 432x432 -colorspace gray app/src/main/res/mipmap-xxxhdpi/ic_launcher_monochrome.png

      - name: Assemble Release
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: kizzyfork
          KEY_ALIAS: kizzyfork
          KEY_PASSWORD: kizzyfork
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/**.apk

      - name: Find APK
        id: apk
        run: echo "path=$(find app/build/outputs/apk/release -name '*.apk' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fork-${{ github.run_number }}
          name: Kizzy Fork build ${{ github.run_number }}
          body: |
            Signed release build of the Kizzy Fork (package `io.kizzy.fork`).

            Fork customizations built by Claude (Anthropic's Claude Code).
            See the [README](../../blob/master/README.md) for the full list of changes.
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
